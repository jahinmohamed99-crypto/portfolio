<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dice Game</title>
<style>
body {
  text-align: center;
  font-family: Arial;
  background-color: #222;
  color: white;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 50px;
}

.dice {
  font-size: 100px;
  margin: 20px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🎲 Dice Game</h1>

<div>
  <span id="dice1" class="dice">🎲</span>
  <span id="dice2" class="dice">🎲</span>
</div>

<h2 id="result">Click Roll!</h2>

<button onclick="rollDice()">Roll Dice</button>

<script>
function rollDice() {
  let num1 = Math.floor(Math.random() * 6) + 1;
  let num2 = Math.floor(Math.random() * 6) + 1;

  const dice = ["⚀","⚁","⚂","⚃","⚄","⚅"];

  document.getElementById("dice1").textContent = dice[num1 - 1];
  document.getElementById("dice2").textContent = dice[num2 - 1];

  if (num1 > num2) {
    document.getElementById("result").textContent = "Player 1 Wins!";
  } else if (num2 > num1) {
    document.getElementById("result").textContent = "Player 2 Wins!";
  } else {
    document.getElementById("result").textContent = "Draw!";
  }
}
</script>

</body>
</html>
